<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>就活スケジュール管理</title>
    <style>
        /* ここからデザイン（CSS）の設定 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            padding: 20px 10px; /* スマホの画面端に少し余白を作る */
        }

        /* アプリ全体を囲む箱 */
        .container {
            width: 100%;
            max-width: 600px; /* 💻 PCで見た時に横に広がりすぎないブレーキ（PC対応） */
            margin: 0 auto;   /* 💻 PC画面では真ん中に寄せる */
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        h1 {
            font-size: 20px;
            text-align: center;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 14px;
        }

        /* 📱 入力欄（スマホで一番大事な部分） */
        input[type="text"], input[type="date"], select, textarea {
            width: 100%;       /* 画面の横幅いっぱいに広げる */
            padding: 12px;     /* スマホで指でタップしやすい高さ */
            font-size: 16px;   /* ⚠️重要：16px未満にするとiPhoneで勝手にズームしてバグるのを防ぐ */
            border: 1px solid #ccc;
            border-radius: 4px;
            background-color: #fff;
        }

        /* 📱 ボタンもタップしやすい大きさに */
        .btn {
            width: 100%;       /* スマホで押しやすいように横いっぱいに */
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            background-color: #007bff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>就活スケジュール管理</h1>
        
        <div class="form-group">
            <label for="company">企業名</label>
            <input type="text" id="company" placeholder="例: ○○株式会社">
        </div>

        <div class="form-group">
            <label for="status">選考状況</label>
            <select id="status">
                <option>書類選考中</option>
                <option>面接待ち</option>
                <option>内定</option>
            </select>
        </div>

        <button class="btn">登録する</button>
    </div>

</body>
</html>
